<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YESBOSS 项目推进</title>
    <link rel="stylesheet" href="./action-page.css" />
  </head>
  <body>
    <main class="action-shell">
      <header class="action-topbar">
        <h1>项目推进</h1>
        <a href="./index.html">返回茶水间</a>
      </header>
      <section class="action-content">
        <div class="panel">
          <h2>版本进度</h2>
          <div class="metric-grid">
            <div class="metric"><span>当前版本</span><strong>1.0</strong></div>
            <div class="metric"><span>完成度</span><strong>42%</strong></div>
            <div class="metric"><span>阻塞项</span><strong>3</strong></div>
            <div class="metric"><span>上线风险</span><strong>中</strong></div>
          </div>
        </div>
        <div class="panel">
          <h2>推进策略</h2>
          <ul>
            <li>确认优先级，减少无效返工。</li>
            <li>处理测试环境和联调问题。</li>
            <li>在进度和质量之间做决策。</li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
