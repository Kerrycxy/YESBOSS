<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YESBOSS 财务决策</title>
    <link rel="stylesheet" href="./action-page.css" />
  </head>
  <body>
    <main class="action-shell">
      <header class="action-topbar">
        <h1>财务决策</h1>
        <a href="./index.html">返回茶水间</a>
      </header>
      <section class="action-content">
        <div class="panel">
          <h2>现金流</h2>
          <div class="metric-grid">
            <div class="metric"><span>现金余额</span><strong>100000</strong></div>
            <div class="metric"><span>时收入</span><strong>+2500</strong></div>
            <div class="metric"><span>人力成本</span><strong>低</strong></div>
            <div class="metric"><span>预算压力</span><strong>可控</strong></div>
          </div>
        </div>
        <div class="panel">
          <h2>财务动作</h2>
          <ul>
            <li>决定招聘、加薪或削减预算。</li>
            <li>为项目加速投入资源。</li>
            <li>守住现金流，避免经营失控。</li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
