<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YESBOSS 办公室场景2</title>
    <link rel="stylesheet" href="./office2-style.css" />
  </head>
  <body>
    <main class="scene-shell">
      <canvas id="gameCanvas" width="1024" height="580" aria-label="Office scene 2"></canvas>
      <aside class="info-panel" aria-label="场景信息">
        <h1>办公室</h1>
        <p class="hint">方向键 / WASD 移动</p>
        <p class="hint">H 键切换碰撞框</p>
        <p class="hint">点击查看像素坐标</p>
        <div class="status-box">
          <p id="coordDisplay">像素：(0, 0)</p>
          <p id="statusDisplay">状态：待命</p>
        </div>
        <button id="backButton" type="button">返回茶水间</button>
      </aside>
    </main>
    <script src="./office2-map.js"></script>
  </body>
</html>
