<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YESBOSS 走廊场景</title>
    <link rel="stylesheet" href="./office2-style.css" />
  </head>
  <body>
    <main class="scene-shell">
      <canvas id="gameCanvas" width="1024" height="640" aria-label="Office corridor scene"></canvas>
      <aside class="info-panel" aria-label="场景信息">
        <h1>走廊</h1>
        <p class="hint">方向键 / WASD 移动</p>
        <p class="hint">G 键切换网格</p>
        <p class="hint">点击查看格子坐标</p>
        <div class="status-box">
          <p id="coordDisplay">坐标：(0, 0)</p>
          <p id="statusDisplay">状态：待命</p>
        </div>
        <button id="backButton" type="button">返回办公室</button>
      </aside>
    </main>
    <script src="./office2-map.js"></script>
  </body>
</html>
