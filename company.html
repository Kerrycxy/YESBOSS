<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YESBOSS 公司管理</title>
    <link rel="stylesheet" href="./action-page.css" />
  </head>
  <body>
    <main class="action-shell">
      <header class="action-topbar">
        <h1>公司管理</h1>
        <a href="./index.html">返回茶水间</a>
      </header>
      <section class="action-content">
        <div class="panel">
          <h2>经营概览</h2>
          <div class="metric-grid">
            <div class="metric"><span>公司等级</span><strong>Lv.1</strong></div>
            <div class="metric"><span>办公容量</span><strong>5/20</strong></div>
            <div class="metric"><span>士气</span><strong>80</strong></div>
            <div class="metric"><span>董事会信任</span><strong>60</strong></div>
          </div>
        </div>
        <div class="panel">
          <h2>待办</h2>
          <ul>
            <li>检查今日管理目标。</li>
            <li>规划办公室扩建与招聘节奏。</li>
            <li>平衡员工士气和现金流。</li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
