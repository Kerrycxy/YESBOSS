<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YESBOSS 员工沟通</title>
    <link rel="stylesheet" href="./action-page.css" />
  </head>
  <body>
    <main class="action-shell">
      <header class="action-topbar">
        <h1>员工沟通</h1>
        <a href="./index.html">返回茶水间</a>
      </header>
      <section class="action-content">
        <div class="panel">
          <h2>团队状态</h2>
          <div class="metric-grid">
            <div class="metric"><span>在线员工</span><strong>5</strong></div>
            <div class="metric"><span>待回复消息</span><strong>5</strong></div>
            <div class="metric"><span>加班风险</span><strong>中</strong></div>
            <div class="metric"><span>团队氛围</span><strong>稳定</strong></div>
          </div>
        </div>
        <div class="panel">
          <h2>沟通事项</h2>
          <ul>
            <li>处理员工反馈和需求变更。</li>
            <li>安排会议或一对一沟通。</li>
            <li>用及时回复降低士气损耗。</li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
